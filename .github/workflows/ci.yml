name: CI

on:
    push:
        branches:
            - main

jobs:
    build:
        name: Build Project
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Set up PNPM
              uses: pnpm/action-setup@v3
              with:
                  version: latest

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build project
              run: pnpm run build
